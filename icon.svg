<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Hexagon outline — dark -->
  <rect x="4" y="2" width="8" height="1" fill="#064e3b"/>
  <rect x="2" y="3" width="12" height="1" fill="#064e3b"/>
  <rect x="1" y="4" width="14" height="1" fill="#064e3b"/>
  <rect x="0" y="5" width="16" height="6" fill="#064e3b"/>
  <rect x="1" y="11" width="14" height="1" fill="#064e3b"/>
  <rect x="2" y="12" width="12" height="1" fill="#064e3b"/>
  <rect x="4" y="13" width="8" height="1" fill="#064e3b"/>

  <!-- Hexagon fill — emerald -->
  <rect x="5" y="3" width="6" height="1" fill="#10b981"/>
  <rect x="3" y="4" width="10" height="1" fill="#10b981"/>
  <rect x="2" y="5" width="12" height="1" fill="#10b981"/>
  <rect x="1" y="6" width="14" height="4" fill="#10b981"/>
  <rect x="2" y="10" width="12" height="1" fill="#10b981"/>
  <rect x="3" y="11" width="10" height="1" fill="#10b981"/>
  <rect x="5" y="12" width="6" height="1" fill="#10b981"/>

  <!-- Upper-left highlight -->
  <rect x="5" y="3" width="3" height="1" fill="#34d399"/>
  <rect x="3" y="4" width="4" height="1" fill="#34d399"/>
  <rect x="2" y="5" width="5" height="1" fill="#34d399"/>
  <rect x="1" y="6" width="4" height="1" fill="#34d399"/>

  <!-- Network nodes — constellation inside hex -->
  <rect x="7" y="4" width="2" height="1" fill="#a7f3d0"/>
  <rect x="3" y="7" width="2" height="1" fill="#a7f3d0"/>
  <rect x="11" y="7" width="2" height="1" fill="#a7f3d0"/>
  <rect x="5" y="10" width="2" height="1" fill="#a7f3d0"/>
  <rect x="9" y="10" width="2" height="1" fill="#a7f3d0"/>

  <!-- Connection lines — subtle -->
  <rect x="6" y="5" width="1" height="1" fill="#059669"/>
  <rect x="5" y="6" width="1" height="1" fill="#059669"/>
  <rect x="4" y="7" width="1" height="1" fill="#059669"/>
  <rect x="9" y="5" width="1" height="1" fill="#059669"/>
  <rect x="10" y="6" width="1" height="1" fill="#059669"/>
  <rect x="4" y="8" width="1" height="1" fill="#059669"/>
  <rect x="5" y="9" width="1" height="1" fill="#059669"/>
  <rect x="11" y="8" width="1" height="1" fill="#059669"/>
  <rect x="10" y="9" width="1" height="1" fill="#059669"/>

  <!-- Central hub — brightest -->
  <rect x="7" y="7" width="2" height="2" fill="#6ee7b7"/>
  <rect x="7" y="7" width="2" height="1" fill="#a7f3d0"/>
</svg>
